<!DOCTYPE html>
<html>
<head>
<title>Customer Login</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#2e7d32;
    color:white;
    border:none;
    cursor:pointer;
}

</style>

</head>
<body>

<div class="login-box">

<h2>Customer Login</h2>

<form action="login.php" method="POST">

<input type="email"
name="email"
placeholder="Email"
required>

<input type="password"
name="password"
placeholder="Password"
required>

<button type="submit"
name="login">
Login
</button>

</form>

<br>

<a href="register.html">
Create New Account
</a>

</div>

</body>
</html>
